<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Checkout</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script type="module">
        import { getCart } from '/js/cart.mjs';
        
        // Function to display order summary
        function displayOrderSummary() {
            const cart = getCart();
            const subtotal = cart.reduce((sum, item) => sum + item.FinalPrice, 0);
            const shipping = 10.00;
            const tax = subtotal * 0.1; // 10% tax
            const total = subtotal + shipping + tax;
            
            const numberItemsElem = document.getElementById('numberItems');
            const cartTotalElem = document.getElementById('cartTotal');
            const shippingElem = document.getElementById('shipping');
            const taxElem = document.getElementById('tax');
            const totalElem = document.getElementById('total');
            
            if (numberItemsElem) numberItemsElem.textContent = cart.length;
            if (cartTotalElem) cartTotalElem.textContent = `$${subtotal.toFixed(2)}`;
            if (shippingElem) shippingElem.textContent = `$${shipping.toFixed(2)}`;
            if (taxElem) taxElem.textContent = `$${tax.toFixed(2)}`;
            if (totalElem) totalElem.textContent = `$${total.toFixed(2)}`;
        }
        
        // Handle form submission
        document.addEventListener('DOMContentLoaded', () => {
            displayOrderSummary();
            
            const form = document.querySelector('form[name="checkout"]');
            if (form) {
                form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    alert('Order placed successfully! Your cart has been cleared.');
                    localStorage.removeItem('so-cart');
                    window.location.href = '/cart/';
                });
            }
        });
    </script>
</head>

<body>
    <header class="divider" id="main-header">
        <div class="logo">
            <img src="/images/noun_Tent_2517.svg" alt="tent image for logo" />
            <a href="/cart/"> Sleep<span class="highlight">Outside</span></a>
        </div>
        
        <nav class="nav-links">
            <a href="/cart/">Cart</a>
            <a href="/products.html">Products</a>
            <a href="/checkout/">Checkout</a>
        </nav>
        
        <div class="cart">
            <a href="/cart/">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="30" height="30">
                    <path d="M18.9 32.6c1.1 2.4 2.5 3.3 5.4 3.3 1.6 0 3.6-0.3 5.9-0.6 3.2-0.5 6.9-1 11.2-1 2.1 0 4.3 0.1 6.4 0.3 2.1 0.1 4.2 0.3 6.1 0.3 3.2 0 5.2-0.4 5.9-1.2 2.7-2.7 2.8-8.8 2.9-14.6 0.1-6.7 0.2-14.5 4.6-18.7 -0.5 0-1 0-1.6 0 -14.2 0-37.5 0-41.1 0C15.6 6.2 14.9 23.6 18.9 32.6z"/>
                </svg>
            </a>
        </div>
    </header>

    <main class="divider checkout">
        <h2>Review & Place your Order</h2>
        <section class="checkout-form">
            <form name="checkout">
                <fieldset>
                    <legend>Customer Information</legend>
                    <div class="checkout__name">
                        <label for="fname">First Name</label>
                        <input type="text" name="fname" id="fname" required />
                        <label for="lname">Last Name</label>
                        <input type="text" name="lname" id="lname" required />
                    </div>
                    <div class="checkout__address">
                        <label for="address">Address</label>
                        <input type="text" name="address" id="address" required />
                        <label for="city">City</label>
                        <input type="text" name="city" id="city" required />
                        <label for="state">State</label>
                        <input type="text" name="state" id="state" required />
                        <label for="zip">Zip</label>
                        <input type="text" name="zip" id="zip" required />
                    </div>
                </fieldset>
                <fieldset>
                    <legend>Payment</legend>
                    <div class="checkout__payment">
                        <label for="cardNumber">Card Number</label>
                        <input type="text" name="cardNumber" id="cardNumber" required />
                        <label for="exp">Expiration</label>
                        <input type="text" name="exp" id="exp" placeholder="MM/YY" required />
                        <label for="cvv">CVV</label>
                        <input type="text" name="cvv" id="cvv" required />
                    </div>
                </fieldset>
                <fieldset class="checkout-summary">
                    <legend>Order Summary</legend>
                    <div class="order__summary">
                        <div>Items</div>
                        <div id="numberItems">0</div>
                        <div>Subtotal</div>
                        <div id="cartTotal">$0.00</div>
                        <div>Shipping</div>
                        <div id="shipping">$10.00</div>
                        <div>Tax</div>
                        <div id="tax">$0.00</div>
                        <div>Total</div>
                        <div id="total">$0.00</div>
                    </div>
                </fieldset>
                <button type="submit" id="checkoutSubmit">Place Order</button>
            </form>
        </section>
    </main>

    <footer id="main-footer"></footer>
</body>
</html>
