<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="/css/checkout.css">
</head>
<body>
    <div class="checkout-container">
        <div class="checkout-form">
            <h2>Shipping Information</h2>
            <form id="checkout-form">
                <div class="form-group">
                    <label for="fname">First Name *</label>
                    <input type="text" id="fname" name="fname" required>
                </div>
                
                <div class="form-group">
                    <label for="lname">Last Name *</label>
                    <input type="text" id="lname" name="lname" required>
                </div>
                
                <div class="form-group">
                    <label for="street">Address *</label>
                    <input type="text" id="street" name="street" required>
                </div>
                
                <div class="form-group">
                    <label for="city">City *</label>
                    <input type="text" id="city" name="city" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="state">State *</label>
                        <input type="text" id="state" name="state" maxlength="2" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="zip">Zip Code *</label>
                        <input type="text" id="zip" name="zip" required>
                    </div>
                </div>
                
                <h2>Payment Information</h2>
                <div class="form-group">
                    <label for="cardNumber">Credit Card Number *</label>
                    <input type="text" id="cardNumber" name="cardNumber" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="expiration">Expiration Date (MM/YY) *</label>
                        <input type="text" id="expiration" name="expiration" placeholder="MM/YY" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="code">Security Code *</label>
                        <input type="text" id="code" name="code" maxlength="4" required>
                    </div>
                </div>
                
                <button type="submit" class="submit-order">Place Order</button>
            </form>
        </div>
        
        <div class="order-summary">
            <h2>Order Summary</h2>
            <div class="summary-details">
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span id="subtotal">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Tax (6%):</span>
                    <span id="tax">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Shipping:</span>
                    <span id="shipping">$0.00</span>
                </div>
                <div class="summary-row total">
                    <span>Order Total:</span>
                    <span id="orderTotal">$0.00</span>
                </div>
            </div>
        </div>
    </div>
    
    <script type="module" src="/js/checkout.js"></script>
</body>
</html>
