<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Checkout</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <header class="divider" id="main-header">
      <div class="logo">
      </div>
    </header>

    <main class="divider checkout-container">
    <h1>Checkout</h1>
    
    <div class="checkout-grid">
      <!-- Checkout Form -->
      <div class="checkout-form">
        <form id="checkout-form" name="checkout-form">
          <h2>Customer Information</h2>
          
          <div class="form-group">
            <label for="fname">First Name *</label>
            <input type="text" id="fname" name="fname" required>
          </div>
          
          <div class="form-group">
            <label for="lname">Last Name *</label>
            <input type="text" id="lname" name="lname" required>
          </div>
          
          <h2>Shipping Address</h2>
          
          <div class="form-group">
            <label for="street">Street Address *</label>
            <input type="text" id="street" name="street" required>
          </div>
          
          <div class="form-group">
            <label for="city">City *</label>
            <input type="text" id="city" name="city" required>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label for="state">State *</label>
              <input type="text" id="state" name="state" required maxlength="2" placeholder="ID">
            </div>
            
            <div class="form-group">
              <label for="zip">Zip Code *</label>
              <input type="text" id="zip" name="zip" required>
            </div>
          </div>
          
          <h2>Payment Information</h2>
          
          <div class="form-group">
            <label for="cardNumber">Credit Card Number *</label>
            <input type="text" id="cardNumber" name="cardNumber" required maxlength="16" pattern="[0-9]{16}" placeholder="1234123412341234">
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label for="expiration">Expiration Date (MM/YY) *</label>
              <input type="text" id="expiration" name="expiration" required placeholder="MM/YY" pattern="(0[1-9]|1[0-2])\/([0-9]{2})" value="12/25">
            </div>
            
            <div class="form-group">
              <label for="code">Security Code *</label>
              <input type="text" id="code" name="code" required maxlength="3" pattern="[0-9]{3}" placeholder="123">
            </div>
          </div>
          
          <button type="submit" class="submit-order-btn">Place Order</button>
        </form>
      </div>
      
      <!-- Order Summary -->
      <div class="order-summary">
        <h2>Order Summary</h2>
        <div class="summary-details">
          <div class="summary-row">
            <span>Subtotal:</span>
            <span id="subtotal">$0.00</span>
          </div>
          <div class="summary-row">
            <span>Tax (6%):</span>
            <span id="tax">$0.00</span>
          </div>
          <div class="summary-row">
            <span>Shipping:</span>
            <span id="shipping">$0.00</span>
          </div>
          <div class="summary-row total">
            <span>Order Total:</span>
            <span id="order-total">$0.00</span>
          </div>
        </div>
      </div>
    </div>
  </main>

    <footer id="main-footer"></footer>
  </body>
</html>
