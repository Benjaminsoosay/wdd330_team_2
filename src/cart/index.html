<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Sleep Outside</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header id="main-header"></header>
    
    <main class="cart-main">
        <h1>Shopping Cart</h1>
        
        <div class="cart-container">
            <!-- Cart items section -->
            <div class="cart-items">
                <ul class="product-list cart-card-list">
                    <!-- Cart items will be rendered here -->
                </ul>
            </div>
            
            <!-- Order Summary Section -->
            <div class="cart-summary">
                <h3>Order Summary</h3>
                <div class="summary-details">
                    <div class="summary-row">
                        <span>Subtotal:</span>
                        <span id="cart-subtotal">$0.00</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total:</span>
                        <span id="cart-total">$0.00</span>
                    </div>
                </div>
                <a href="/checkout/" class="checkout-button">Proceed to Checkout</a>
            </div>
        </div>
        
        <div class="list-footer hide">
            <!-- Optional footer content -->
        </div>
    </main>
    
    <footer id="main-footer"></footer>
    
    <script type="module" src="/js/cart.mjs"></script>
</body>
</html>
