<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Cart</title>

    <link rel="stylesheet" href="/css/style.css" />

    <script src="../js/cart.js" type="module"></script>
  </head>

  <body>
    <header class="divider" id="main-header">
      <div class="logo">
    </header>

    <main class="divider">
    <section class="products">
      <h2>My Cart</h2>

      <ul class="product-list" id="cart-list">
        <!-- Cart items will be dynamically inserted here -->
      </ul>
      
      <!-- Add Cart Summary and Checkout Button -->
      <div class="cart-summary">
        <div class="cart-total">
          <h3>Order Summary</h3>
          <div class="summary-row">
            <span>Subtotal:</span>
            <span id="cart-subtotal">$0.00</span>
          </div>
          <div class="summary-row total">
            <span>Total:</span>
            <span id="cart-total">$0.00</span>
          </div>
        </div>
        <button id="checkout-button" class="checkout-btn">Proceed to Checkout</button>
      </div>
    </section>
  </main>


    <footer id="main-footer"></footer>
  </body>
</html>
