<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Home</title>
    <link rel="stylesheet" href="/style.css/css" />
    <script src="/js/main.js" type="module"></script>  <!-- Changed to absolute path -->
  </head>

  <body>
    <header class="divider" id="main-header"></header>
    <main class="divider">
      <div class="hero">
        <img
          src="/src/images/banner.jpg"
          srcset="/images/banner-sm.jpg 500w, /images/banner.jpg"  <!-- Fixed paths -->
          alt="image of a high mountain lake"
        />
        <div class="logo logo--square">
          <img src="/src/images/noun_Tent_2517.svg" alt="tent image for logo" />  <!-- Fixed path -->
          <div>Sleep<span class="highlight">Outside</span></div>
        </div>
        <div class="mission">
          <p>
            Our mission is to provide you with everything you need to sleep
            outside comfortably at an affordable price.
          </p>
        </div>
      </div>

      <section class="products">
        <ul class="product-grid">
          <li>
            <a href="/product_listing/index.html?category=tents">  <!-- Fixed path -->
              <img src="/src/images/category-tents.svg" alt="Tents" />  <!-- Fixed path -->
              <h2>Tents</h2>
            </a>
          </li>
          <li>
            <a href="/product_listing/index.html?category=backpacks">  <!-- Fixed path -->
              <img src="/src/images/noun_Backpack_2389275.svg" alt="Backpacks" />  <!-- Fixed path -->
              <h2>Backpacks</h2>
            </a>
          </li>
          <li>
            <a href="/product_listing/index.html?category=sleeping-bags">  <!-- Fixed path -->
              <img src="/src/images/category-sleepingbags.svg" alt="Sleeping Bags" />  <!-- Fixed path -->
              <h2>Sleeping Bags</h2>
            </a>
          </li>
          <li>
            <a href="/product_listing/index.html?category=hammocks">  <!-- Fixed path -->
              <img src="/src/images/category-hammocks.svg" alt="Hammocks" />  <!-- Fixed path -->
              <h2>Hammocks</h2>
            </a>
          </li>
        </ul>
      </section>
    </main>
    <footer id="main-footer"></footer>
  </body>
</html>
