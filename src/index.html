<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Home</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body>
    <header class="divider" id="main-header">
      <div class="logo">
      </div>
    </header>
    <main class="divider">
      <div class="hero">
        <img
          src="/images/banner-sm.jpg"
          srcset="images/banner-sm.jpg 500w, images/banner.jpg"
          alt="image of a high mountain lake"
        />
        <div class="logo logo--square">
          <img src="/images/noun_Tent_2517.svg" alt="tent image for logo" />
          <div>Sleep<span class="highlight">Outside</span></div>
        </div>
        <div class="mission">
          <p>
            Our mission is to provide you with everything you need to sleep
            outside comfortably at an affordable price.
          </p>
        </div>
        <section class="categories">
  <h2>Shop by Category</h2>
  <div class="category-grid">
    <a href="product_listing/index.html?category=tents" class="category">
      <img src="/images/noun_Tent_2517.svg" alt="Tents" />
      <span>Tents</span>
    </a>

    <a href="product_listing/index.html?category=backpacks" class="category">
      <img src="/images/noun_Backpack_1082525.svg" alt="Backpacks" />
      <span>Backpacks</span>
    </a>

    <a href="product_listing/index.html?category=sleeping-bags" class="category">
      <img src="/images/noun_SleepingBag_1082526.svg" alt="Sleeping Bags" />
      <span>Sleeping Bags</span>
    </a>

    <a href="product_listing/index.html?category=hammocks" class="category">
      <img src="/images/noun_Hammock_1082527.svg" alt="Hammocks" />
      <span>Hammocks</span>
    </a>
  </div>
</section>
      </div>

      <section class="products">
        <h2>Top Products</h2>
        <ul class="product-list" id="product-list">
        </ul>
      </section>
    </main>

    <footer id="main-footer">
    </footer>

    <!-- Load main.js as a module -->
  <script type="module" src="./js/main.js"></script>

  </body>
</html>
